function sectionUnlocked(mIdx, sIdx){

}

function matiereFullyDone(mIdx){
  var m = window.__MATIERES__[mIdx];
  for (var i=0;i<m.sections.length;i++){

  }
  return true;
}

function renderMatiere(mIdx){
  var m = window.__MATIERES__[mIdx];
  var sections = m.sections.map(function(sec, sIdx){
    var unlocked = sectionUnlocked(mIdx, sIdx);
    var score = sectionScore(mIdx, sIdx);
    var attempted = sectionAttempted(mIdx, sIdx);
    var passed = score >= UNLOCK_THRESHOLD;
    var statusText = !unlocked ? '🔒 verrouillée' : passed ? 'Réussie ✓ ' + score + '/10' : attempted ? 'En cours · ' + score + '/10' : 'À découvrir';
    var cls = unlocked ? '' : 'lock';
    var clickable = unlocked ? "App.go('section',"+mIdx+","+sIdx+")" : "";
    return '<button '+(unlocked ? 'onclick="'+clickable+'"' : 'disabled')+' class="card '+cls+'" style="display:flex;align-items:center;gap:14px;padding:15px 18px;width:100%;text-align:left;border:3px solid '+(passed ? m.border : 'rgba(0,0,0,.06)')+';cursor:'+(unlocked?'pointer':'default')+';margin-bottom:12px;">'+
      '<div style="width:40px;height:40px;border-radius:12px;background:'+(passed ? m.tintSoft : '#F4F1F7')+';display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0;">'+(sIdx+1)+'</div>'+
      '<div style="flex:1;">'+
        '<div style="font-weight:800;font-size:16px;">'+esc(sec.title)+'</div>'+
        '<div style="font-size:13px;font-weight:700;opacity:.6;margin-top:2px;">'+statusText+'</div>'+
      '</div>'+
    '</button>';
  }).join('');

  return topBar('accueil')+
    '<div style="display:flex;align-items:center;gap:14px;background:'+m.tintSoft+';border:3px solid '+m.border+';border-radius:24px;padding:18px 20px;margin:16px 0;">'+
      '<div style="width:64px;height:64px;border-radius:18px;background:#fff;display:flex;align-items:center;justify-content:center;">'+animalHTML(m.animal,52,m.tint,m.tintSoft)+'</div>'+
      '<div class="title-font" style="font-size:23px;font-weight:800;">'+m.label+'</div>'+
    '</div>'+
    sections;
}

function enrichEx(ex, id){
  var a = state.answers[id] || {};
  if (ex.type === 'qcm'){
    var sel = a.sel == null ? null : a.sel;
    var status = sel == null ? 'idle' : (sel === ex.correct ? 'correct' : 'wrong');
    var optsHTML = ex.opts.map(function(label, i){
      var bg='#fff', bc='#EDE0F4', mark='';
      var isC = i===ex.correct, isS = i===sel;
      if (status==='correct' && isC) { bg='#E4F8EE'; bc='#57C495'; mark=' ✓'; }
      else if (status==='wrong' && isS) { bg='#FFE6EF'; bc='#FF7DAE'; mark=' ✕'; }
      else if (status==='wrong' && isC) { bg='#EDFAF3'; bc='#8FD8B4'; mark=' ✓'; }
      return '<button class="opt-btn" style="background:'+bg+';border-color:'+bc+';" onclick="App.answer(\''+id+'\','+i+')">'+esc(label)+mark+'</button>';
    }).join('');
    return { body:'<div style="display:grid;gap:10px;">'+optsHTML+'</div>', status:status };
  }
  if (ex.type === 'fill'){
    var sel = a.sel == null ? null : a.sel;
    var status = sel == null ? 'idle' : (sel === ex.correct ? 'correct' : 'wrong');
    var blankText = sel == null ? '？' : ex.opts[sel];
    var blankBc = status==='correct' ? '#57C495' : status==='wrong' ? '#FF7DAE' : '#C9B6E8';
    var blankBg = status==='correct' ? '#E4F8EE' : status==='wrong' ? '#FFE6EF' : '#F7F1FF';
    var optsHTML = ex.opts.map(function(label, i){
      var bg='#fff', bc='#EDE0F4';
      var isC=i===ex.correct, isS=i===sel;
      if (status==='correct' && isC){ bg='#E4F8EE'; bc='#57C495'; }
      else if (status==='wrong' && isS){ bg='#FFE6EF'; bc='#FF7DAE'; }
      else if (status==='wrong' && isC){ bg='#EDFAF3'; bc='#8FD8B4'; }
      return '<button class="opt-btn" style="background:'+bg+';border-color:'+bc+';flex:1;text-align:center;" onclick="App.answer(\''+id+'\','+i+')">'+esc(label)+'</button>';
    }).join('');
    return { body:
      '<div class="title-font" style="font-size:19px;font-weight:700;margin-bottom:14px;">'+esc(ex.before)+
        '<span style="display:inline-block;min-width:46px;text-align:center;border:3px solid '+blankBc+';background:'+blankBg+';border-radius:10px;padding:2px 8px;">'+esc(blankText)+'</span>'+
        esc(ex.after)+'</div>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap;">'+optsHTML+'</div>',
      status: status };
  }
  if (ex.type === 'calc'){
    var status = a.status || 'idle';
    var draft = a.draft || '';
    var inputBc = status==='correct' ? '#57C495' : status==='wrong' ? '#FF7DAE' : '#E3D3EF';
    return { body:
      '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">'+
        '<input class="answer-input" style="border-color:'+inputBc+';" value="'+esc(draft)+'" placeholder="ta réponse…" '+
          'oninput="App.setDraft(\''+id+'\',this.value)" onkeydown="if(event.key===\'Enter\')App.checkCalc(\''+id+'\')">'+
        '<button class="btn" style="background:#BDEFD6;border:3px solid #8fdcb4;border-radius:999px;padding:11px 20px;font-size:15px;" onclick="App.checkCalc(\''+id+'\')">Vérifier ✓</button>'+
      '</div>',
      status: status };
  }
  return { body:'', status:'idle' };
}

function renderSection(mIdx, sIdx){
  var m = window.__MATIERES__[mIdx];
  var sec = m.sections[sIdx];
  var score = sectionScore(mIdx, sIdx);
  var passed = score >= UNLOCK_THRESHOLD;
  var nextUnlockedNow = false;
  if (sIdx+1 < m.sections.length) nextUnlockedNow = passed;

  var exercisesHTML = sec.ex.map(function(ex, eIdx){
    var id = exId(mIdx, sIdx, eIdx);
    var r = enrichEx(ex, id);
    var feedback = '';
    if (r.status === 'correct') feedback = '<div style="margin-top:12px;background:#E4F8EE;border:2px solid #8fdcb4;border-radius:14px;padding:10px 14px;font-weight:800;font-size:14px;color:#2F9E6B;">🎉 Bravo, c\'est exact ! '+(ex.exp?('<span style="font-weight:600;opacity:.85;"> — '+esc(ex.exp)+'</span>'):'')+'</div>';
    else if (r.status === 'wrong') feedback = '<div style="margin-top:12px;background:#FFE9F1;border:2px solid var(--rose,#FF7DAE);border-radius:14px;padding:10px 14px;font-weight:800;font-size:14px;color:#D24C86;">👀 Pas tout à fait, la bonne réponse est en vert.'+(ex.exp?(' <span style="font-weight:600;opacity:.85;">'+esc(ex.exp)+'</span>'):'')+'</div>';
    return '<div class="card" style="padding:20px;border:3px solid rgba(0,0,0,.06);margin-bottom:16px;">'+
      '<div style="display:inline-flex;align-items:center;gap:7px;background:'+m.tintSoft+';border-radius:12px;padding:5px 13px;font-family:\'Baloo 2\',cursive;font-weight:800;font-size:12px;margin-bottom:14px;">EXERCICE '+(eIdx+1)+' / '+sec.ex.length+'</div>'+
      (ex.type !== 'fill' ? '<div class="title-font" style="font-size:18px;font-weight:700;line-height:1.3;margin-bottom:16px;">'+esc(ex.q)+'</div>' : '')+
      r.body+feedback+
    '</div>';
  }).join('');

  var banner = '';
  if (passed) {
    banner = '<div class="card pop" style="padding:18px 20px;margin-bottom:18px;border:3px solid #8fdcb4;background:#EAFBF1;text-align:center;">'+
      '<div class="title-font" style="font-weight:800;font-size:17px;">🎉 Section réussie ! ('+score+'/10)</div>'+
      (sIdx+1 < m.sections.length ? '<div style="font-size:14px;font-weight:700;opacity:.75;margin-top:4px;">La section suivante est débloquée.</div>'+
        '<button class="btn" style="margin-top:10px;background:'+m.tint+';color:#fff;border:none;border-radius:999px;padding:12px 24px;" onclick="App.go(\'section\','+mIdx+','+(sIdx+1)+')">Section suivante →</button>'
        : '<div style="font-size:14px;font-weight:700;opacity:.75;margin-top:4px;">Tu as fini toutes les sections de '+m.label+' ! 🏆</div>')+
    '</div>';
  } else {
    banner = '<div class="card" style="padding:14px 20px;margin-bottom:18px;border:3px solid '+m.border+';background:'+m.tintSoft+';text-align:center;font-weight:800;font-size:14px;">'+
      score+' / 10 bonnes réponses · il en faut '+UNLOCK_THRESHOLD+' pour débloquer la section suivante. Tu peux réessayer les exercices !'+
    '</div>';
  }

  return topBar('matiere', mIdx)+
    '<div style="display:flex;align-items:center;gap:14px;background:'+m.tintSoft+';border:3px solid '+m.border+';border-radius:24px;padding:16px 20px;margin:16px 0;">'+
      '<div style="width:52px;height:52px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;">'+animalHTML(m.animal,42,m.tint,m.tintSoft)+'</div>'+
      '<div><div style="font-size:12px;font-weight:800;opacity:.6;letter-spacing:.04em;">'+m.label.toUpperCase()+'</div>'+
      '<div class="title-font" style="font-size:19px;font-weight:800;">'+esc(sec.title)+'</div></div>'+
    '</div>'+
    banner+
    exercisesHTML;
}

function renderTrophees(){
  var badges = window.__MATIERES__.map(function(m, mIdx){
    var earned = matiereFullyDone(mIdx);
    return '<div class="card" style="padding:18px;text-align:center;border:3px solid '+(earned?m.border:'#E7E2EE')+';opacity:'+(earned?1:.55)+';">'+
      '<div style="'+(earned?'':'filter:grayscale(1);opacity:.7;')+'">'+animalHTML(m.animal,50,m.tint,m.tintSoft,earned?'wow':undefined)+'</div>'+
      '<div class="title-font" style="font-weight:800;font-size:14px;margin-top:6px;">'+m.label+'</div>'+
      '<div style="font-size:12px;font-weight:700;opacity:.7;margin-top:2px;">'+(earned?'Débloqué !':'🔒 à débloquer')+'</div>'+
    '</div>';
  }).join('');
  var champ = window.__MATIERES__.every(function(m,i){ return matiereFullyDone(i); });
  return topBar('home')+
    '<div style="text-align:center;margin:18px 0 22px;">'+animalHTML('chat',90,'#FF6BAA','#FFF0F5', champ?'wow':'happy')+
      '<div class="title-font" style="font-size:24px;font-weight:800;margin-top:8px;">Ma collection</div>'+
      '<div style="font-size:14px;font-weight:700;opacity:.65;">'+(champ?'Tu as tout terminé, bravo !! 🎉':'Continue, tu vas y arriver !')+'</div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">'+badges+'</div>'+
    (champ ? '<div class="card pop" style="margin-top:18px;padding:20px;text-align:center;border:3px solid #FFD86B;background:#FFF6DE;">'+
      '<div style="font-size:38px;">👑</div><div class="title-font" style="font-weight:800;font-size:18px;margin-top:6px;">Championne du CM1 !</div></div>' : '');
}

function render(){
  var html = '';
  if (state.view === 'matiere' && state.matiereId != null) html = renderMatiere(state.matiereId);
  else if (state.view === 'section' && state.matiereId != null && state.sectionIdx != null) html = renderSection(state.matiereId, state.sectionIdx);
  else if (state.view === 'trophees') html = renderTrophees();
  else html = renderHome();
  document.getElementById('app').innerHTML = html;
}

/* ---------- API exposée aux onclick ---------- */
window.App = {
  go: go,
  resetAll: resetAll,
  answer: function(id, i){
    state.answers[id] = state.answers[id] || {};
    state.answers[id].sel = i;
    persist();
    render();
  },
  setDraft: function(id, v){
    state.answers[id] = state.answers[id] || {};
    state.answers[id].draft = v;
    state.answers[id].status = 'idle';
    persist();
  },
  checkCalc: function(id){
    var parts = id.split('_');
    var mIdx = parseInt(parts[0].slice(1),10), sIdx = parseInt(parts[1].slice(1),10), eIdx = parseInt(parts[2].slice(1),10);
    var ex = window.__MATIERES__[mIdx].sections[sIdx].ex[eIdx];
    var a = state.answers[id] || {};
    var d = norm(a.draft);
    if (!d) return;
    var ok = ex.answers.map(norm).indexOf(d) !== -1;
    state.answers[id].status = ok ? 'correct' : 'wrong';
    persist();
    render();
  }
};

render();
})();
</script>
</body>
</html>
